 
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - SYP Shop</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header class="header">
        <nav class="navbar container">
            <a href="index.html" class="logo">
                <span>SYP</span><span>Shop</span>
            </a>
            <div class="nav-links">
                <a href="index.html">Início</a>
                <a href="index.html#produtos">Produtos</a>
                <div id="user-menu"></div>
            </div>
        </nav>
    </header>

    <main class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <h2>Bem-vindo de volta!</h2>
                <p>Faça login para continuar</p>
            </div>

            <form id="login-form" onsubmit="fazerLogin(event)">
                <div class="form-group">
                    <label for="email">E-mail</label>
                    <input type="email" id="email" name="email" required placeholder="seu@email.com">
                </div>

                <div class="form-group">
                    <label for="senha">Senha</label>
                    <input type="password" id="senha" name="senha" required placeholder="••••••••">
                </div>

                <button type="submit" class="btn-primary btn-block">Entrar</button>
            </form>

            <div class="auth-footer">
                <p>Não tem uma conta? <a href="cadastro.html">Cadastre-se</a></p>
            </div>
        </div>
    </main>

    <footer class="footer">
        <div class="container">
            <p>&copy; 2026 SYP Shop - Todos os direitos reservados</p>
        </div>
    </footer>

    <script src="js/config.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/auth.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // Se já estiver logado, redireciona
            if (isAuthenticated()) {
                window.location.href = 'index.html';
            }
            atualizarMenuUsuario();
        });
    </script>
</body>
</html>

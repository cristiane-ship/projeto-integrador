 
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel do Vendedor - SYP Shop</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header class="header">
        <nav class="navbar container">
            <a href="index.html" class="logo">
                <span>SYP</span><span>Shop</span>
            </a>
            <div class="nav-links">
                <a href="index.html">Início</a>
                <a href="index.html#produtos">Produtos</a>
                <div id="user-menu"></div>
            </div>
        </nav>
    </header>

    <main class="container" style="padding: 40px 0;">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: var(--spacing-xl);">
            <h1>Meus Produtos</h1>
            <button class="btn-primary" onclick="mostrarModalProduto()">+ Novo Produto</button>
        </div>
        
        <div id="produtos-container">
            <div class="loading-spinner">Carregando produtos...</div>
        </div>
    </main>

    <div id="modal-produto" class="modal">
        <div class="modal-content">
            <h2 id="modal-titulo">Novo Produto</h2>
            <form id="produto-form">
                <div class="form-group">
                    <label>Nome</label>
                    <input type="text" id="produto-nome" required>
                </div>
                <div class="form-group">
                    <label>Descrição</label>
                    <textarea id="produto-descricao" rows="3"></textarea>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Preço</label>
                        <input type="number" id="produto-preco" step="0.01" required>
                    </div>
                    <div class="form-group">
                        <label>Estoque</label>
                        <input type="number" id="produto-estoque" required>
                    </div>
                </div>
                <div class="form-group">
                    <label>Categoria</label>
                    <input type="text" id="produto-categoria">
                </div>
                <div class="form-group">
                    <label>URL da Imagem</label>
                    <input type="text" id="produto-imagem">
                </div>
                <div style="display: flex; gap: var(--spacing-md); margin-top: var(--spacing-lg);">
                    <button type="submit" class="btn-primary">Salvar</button>
                    <button type="button" class="btn-outline" onclick="fecharModalProduto()">Cancelar</button>
                </div>
            </form>
        </div>
    </div>

    <footer class="footer">
        <div class="container">
            <p>&copy; 2026 SYP Shop - Todos os direitos reservados</p>
        </div>
    </footer>

    <script src="js/config.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/api.js"></script>
    <script src="js/vendedor.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            await verificarAutenticacao(true);
            
            if (!isVendedor()) {
                mostrarMensagem('Acesso negado. Área restrita para vendedores.', 'error');
                setTimeout(() => window.location.href = 'index.html', 2000);
                return;
            }
            
            atualizarMenuUsuario();
            await carregarProdutosVendedor();
        });
    </script>
</body>
</html>

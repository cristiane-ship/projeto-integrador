<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Perfil - SYP Shop</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header class="header">
        <nav class="navbar container">
            <a href="index.html" class="logo">
                <span>SYP</span><span>Shop</span>
            </a>
            <div class="nav-links">
                <a href="index.html">Início</a>
                <a href="index.html#produtos">Produtos</a>
                <div id="user-menu"></div>
            </div>
        </nav>
    </header>

    <main class="container" style="padding: 40px 0;">
        <h1>Meu Perfil</h1>
        
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: var(--spacing-xl); margin-top: var(--spacing-lg);">
            <!-- Dados Pessoais -->
            <div style="background: var(--bg-white); border-radius: var(--radius-lg); padding: var(--spacing-lg);">
                <h3>Dados Pessoais</h3>
                <div id="dados-usuario">
                    <div class="loading-spinner">Carregando...</div>
                </div>
            </div>
            
            <!-- Endereços -->
            <div style="background: var(--bg-white); border-radius: var(--radius-lg); padding: var(--spacing-lg);">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: var(--spacing-md);">
                    <h3>Meus Endereços</h3>
                    <button class="btn-primary" onclick="mostrarModalEndereco()" style="padding: 8px 16px;">+ Novo Endereço</button>
                </div>
                <div id="lista-enderecos">
                    <div class="loading-spinner">Carregando endereços...</div>
                </div>
            </div>
        </div>
    </main>

    <!-- Modal de Endereço -->
    <div id="modal-endereco" class="modal">
        <div class="modal-content">
            <h2 id="modal-titulo">Novo Endereço</h2>
            <form id="endereco-form">
                <input type="hidden" id="endereco-id" value="">
                
                <div class="form-group">
                    <label>CEP *</label>
                    <input type="text" id="cep" placeholder="00000-000" oninput="mascaraCEP(this)" required>
                    <button type="button" class="btn-outline" onclick="buscarCep()" style="margin-top: 8px; padding: 6px 12px;">Buscar CEP</button>
                </div>
                
                <div class="form-group">
                    <label>Logradouro *</label>
                    <input type="text" id="logradouro" required>
                </div>
                
                <div class="form-row">
                    <div class="form-group">
                        <label>Número *</label>
                        <input type="text" id="numero" required>
                    </div>
                    <div class="form-group">
                        <label>Complemento</label>
                        <input type="text" id="complemento">
                    </div>
                </div>
                
                <div class="form-group">
                    <label>Bairro *</label>
                    <input type="text" id="bairro" required>
                </div>
                
                <div class="form-row">
                    <div class="form-group">
                        <label>Cidade *</label>
                        <input type="text" id="cidade" required>
                    </div>
                    <div class="form-group">
                        <label>UF *</label>
                        <select id="estado" required>
                            <option value="">Selecione</option>
                            <option value="AC">AC</option><option value="AL">AL</option><option value="AP">AP</option>
                            <option value="AM">AM</option><option value="BA">BA</option><option value="CE">CE</option>
                            <option value="DF">DF</option><option value="ES">ES</option><option value="GO">GO</option>
                            <option value="MA">MA</option><option value="MT">MT</option><option value="MS">MS</option>
                            <option value="MG">MG</option><option value="PA">PA</option><option value="PB">PB</option>
                            <option value="PR">PR</option><option value="PE">PE</option><option value="PI">PI</option>
                            <option value="RJ">RJ</option><option value="RN">RN</option><option value="RS">RS</option>
                            <option value="RO">RO</option><option value="RR">RR</option><option value="SC">SC</option>
                            <option value="SP">SP</option><option value="SE">SE</option><option value="TO">TO</option>
                        </select>
                    </div>
                </div>
                
                <div class="form-group">
                    <label>
                        <input type="checkbox" id="principal"> Definir como endereço principal
                    </label>
                </div>
                
                <div style="display: flex; gap: var(--spacing-md); margin-top: var(--spacing-lg);">
                    <button type="submit" class="btn-primary">Salvar</button>
                    <button type="button" class="btn-outline" onclick="fecharModalEndereco()">Cancelar</button>
                </div>
            </form>
        </div>
    </div>

    <footer class="footer">
        <div class="container">
            <p>&copy; 2026 SYP Shop - Todos os direitos reservados</p>
        </div>
    </footer>

    <script src="js/config.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/api.js"></script>
    <script src="js/enderecos.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            await verificarAutenticacao(true);
            atualizarMenuUsuario();
            await carregarDadosUsuario();
            await carregarEnderecos();
        });
        
        async function carregarDadosUsuario() {
            const container = document.getElementById('dados-usuario');
            
            try {
                const response = await fetch(`${CONFIG.API_URL}/auth/me`, {
                    headers: getAuthHeaders()
                });
                
                const user = await response.json();
                
                if (response.ok) {
                    container.innerHTML = `
                        <div style="margin-bottom: var(--spacing-md);">
                            <strong>Nome:</strong>
                            <p>${user.nome}</p>
                        </div>
                        <div style="margin-bottom: var(--spacing-md);">
                            <strong>E-mail:</strong>
                            <p>${user.email}</p>
                        </div>
                        <div style="margin-bottom: var(--spacing-md);">
                            <strong>Tipo:</strong>
                            <p>${user.role === 'vendedor' ? 'Vendedor' : user.role === 'admin' ? 'Administrador' : 'Cliente'}</p>
                        </div>
                        <div>
                            <strong>Cadastrado em:</strong>
                            <p>${formatarData(user.data_cadastro)}</p>
                        </div>
                    `;
                } else {
                    container.innerHTML = `<div class="alert alert-error">${user.error}</div>`;
                }
            } catch (error) {
                container.innerHTML = `<div class="alert alert-error">Erro ao carregar dados</div>`;
            }
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finalizar Compra - SYP Shop</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header class="header">
        <nav class="navbar container">
            <a href="index.html" class="logo">
                <span>SYP</span><span>Shop</span>
            </a>
            <div class="nav-links">
                <a href="index.html">Início</a>
                <a href="index.html#produtos">Produtos</a>
                <div id="user-menu"></div>
            </div>
        </nav>
    </header>

    <main class="container" style="padding: 40px 0;">
        <h1>Finalizar Compra</h1>
        
        <div style="display: grid; grid-template-columns: 1fr 400px; gap: var(--spacing-xl);">
            <!-- Coluna da esquerda - Endereços -->
            <div>
                <div class="form-section" style="background: var(--bg-white); border-radius: var(--radius-lg); padding: var(--spacing-lg); margin-bottom: var(--spacing-lg);">
                    <h3 style="margin-bottom: var(--spacing-md);">Endereço de Entrega</h3>
                    <div id="enderecos-container">
                        <div class="loading-spinner">Carregando endereços...</div>
                    </div>
                    <button class="btn-outline" onclick="window.location.href='perfil.html'" style="margin-top: var(--spacing-md);">
                        + Gerenciar Endereços
                    </button>
                </div>
                
                <div class="form-section" style="background: var(--bg-white); border-radius: var(--radius-lg); padding: var(--spacing-lg);">
                    <h3 style="margin-bottom: var(--spacing-md);">Forma de Pagamento</h3>
                    <div class="form-group">
                        <select id="pagamento-metodo" class="form-control">
                            <option value="simulado">Simular Pagamento (Teste)</option>
                        </select>
                    </div>
                </div>
            </div>
            
            <!-- Coluna da direita - Resumo -->
            <div class="carrinho-resumo" style="background: var(--bg-white); border-radius: var(--radius-lg); padding: var(--spacing-lg); position: sticky; top: 100px;">
                <h3>Resumo do Pedido</h3>
                <div id="resumo-pedido">
                    <div class="loading-spinner">Carregando...</div>
                </div>
                <button id="btn-finalizar" class="btn-primary btn-block" onclick="finalizarPedido()">Confirmar Pedido</button>
            </div>
        </div>
    </main>

    <footer class="footer">
        <div class="container">
            <p>&copy; 2026 SYP Shop - Todos os direitos reservados</p>
        </div>
    </footer>

    <script src="js/config.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/api.js"></script>
    <script src="js/checkout.js"></script>
    <script>
        let enderecoSelecionado = null;
        
        document.addEventListener('DOMContentLoaded', async () => {
            await verificarAutenticacao(true);
            atualizarMenuUsuario();
            await carregarResumoPedido();
            await carregarEnderecosCheckout();
        });
    </script>
</body>
</html>

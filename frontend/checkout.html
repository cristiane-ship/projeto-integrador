 
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finalizar Compra - SYP Shop</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header class="header">
        <nav class="navbar container">
            <a href="index.html" class="logo">
                <span>SYP</span><span>Shop</span>
            </a>
            <div class="nav-links">
                <a href="index.html">Início</a>
                <a href="index.html#produtos">Produtos</a>
                <div id="user-menu"></div>
            </div>
        </nav>
    </header>

    <main class="container" style="padding: 40px 0;">
        <h1>Finalizar Compra</h1>
        
        <div style="display: grid; grid-template-columns: 1fr 400px; gap: var(--spacing-xl);">
            <div>
                <div class="form-section">
                    <h3>Endereço de Entrega</h3>
                    <div id="enderecos-container">
                        <div class="loading-spinner">Carregando endereços...</div>
                    </div>
                    <button class="btn-outline" onclick="mostrarModalEndereco()">+ Novo Endereço</button>
                </div>
                
                <div class="form-section">
                    <h3>Forma de Pagamento</h3>
                    <div class="form-group">
                        <select id="pagamento-metodo" class="form-control">
                            <option value="simulado">Simular Pagamento (Teste)</option>
                        </select>
                    </div>
                </div>
            </div>
            
            <div class="carrinho-resumo">
                <h3>Resumo do Pedido</h3>
                <div id="resumo-pedido">
                    <div class="loading-spinner">Carregando...</div>
                </div>
                <button id="btn-finalizar" class="btn-primary btn-block" onclick="finalizarPedido()">Confirmar Pedido</button>
            </div>
        </div>
    </main>

    <div id="modal-endereco" class="modal">
        <div class="modal-content">
            <h2>Novo Endereço</h2>
            <form id="endereco-form">
                <div class="form-group">
                    <label>CEP</label>
                    <input type="text" id="cep" oninput="mascaraCEP(this)" required>
                </div>
                <div class="form-group">
                    <label>Logradouro</label>
                    <input type="text" id="logradouro" required>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Número</label>
                        <input type="text" id="numero" required>
                    </div>
                    <div class="form-group">
                        <label>Complemento</label>
                        <input type="text" id="complemento">
                    </div>
                </div>
                <div class="form-group">
                    <label>Bairro</label>
                    <input type="text" id="bairro" required>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Cidade</label>
                        <input type="text" id="cidade" required>
                    </div>
                    <div class="form-group">
                        <label>UF</label>
                        <input type="text" id="estado" maxlength="2" required>
                    </div>
                </div>
                <div style="display: flex; gap: var(--spacing-md); margin-top: var(--spacing-lg);">
                    <button type="submit" class="btn-primary">Salvar</button>
                    <button type="button" class="btn-outline" onclick="fecharModalEndereco()">Cancelar</button>
                </div>
            </form>
        </div>
    </div>

    <footer class="footer">
        <div class="container">
            <p>&copy; 2026 SYP Shop - Todos os direitos reservados</p>
        </div>
    </footer>

    <script src="js/config.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/api.js"></script>
    <script src="js/checkout.js"></script>
    <script>
        let enderecoSelecionado = null;
        
        document.addEventListener('DOMContentLoaded', async () => {
            await verificarAutenticacao(true);
            atualizarMenuUsuario();
            await carregarResumoPedido();
            await carregarEnderecos();
        });
    </script>
</body>
</html>
